    <center>
        <br><br>
        <h2>Data Mahasiswa</h2>
        <table border="1" cellpadding="5px">
            <tr>
                <td rowspan="2">Baris 1 dan 2, Kolom 1</td>
                <td colspan="2">Baris 1, Kolom 1</td>
            </tr>
            <tr>
                <td> Baris 2, Kolom 1</td>
                <td> Baris 2, Kolom 2</td>
                <!-- <td> Baris 2, Kolom 3</td> -->
            </tr>
        </table>
        <br><br>
        <table border="1" cellpadding="5px">
            <tr>
                <td>1,1</td>
                <td>1,2</td>
                <td>1,3</td>
                <td>1,4</td>
            </tr>
            <tr>
                <td>2,1</td>
                <td align="center" colspan="2" rowspan="2"> ? </td>
                <td>2,3</td>
            </tr>
            <tr>
                <td>3,1</td>
                <td colspan="2">3,2</td>
            </tr>
            <tr>
                <td>4,1</td>
                <td>4,2</td>
                <td>4,3</td>
                <td>4,4</td>
            </tr>

        </table>
        <br><br>
        <form action="#" method="post">

            <!-- Nama -->
            <label>Nama:</label><br>
            <input type="text" name="nama"><br><br>

            <!-- NIM -->
            <label>NIM:</label><br>
            <input type="number" name="nim"><br><br>

            <!-- Password -->
            <label>Password:</label><br>
            <input type="password" name="password"><br><br>

            <!-- Email -->
            <label>Email:</label><br>
            <input type="email" name="email"><br><br>

            <!-- No HP -->
            <label>No HP:</label><br>
            <input type="tel" name="nohp"><br><br>

            <!-- Website -->
            <label>Website Pribadi:</label><br>
            <input type="url" name="website"><br><br>

            <!-- Tanggal Lahir -->
            <label>Tanggal Lahir:</label><br>
            <input type="date" name="tgl_lahir"><br><br>

            <!-- Warna Favorit -->
            <label>Warna Favorit:</label><br>
            <input type="color" name="warna"><br><br>

            <!-- Tingkat Kepuasan -->
            <label>Tingkat Kepuasan:</label><br>
            <input type="range" name="kepuasan" min="0" max="100"><br><br>

            <!-- Jenis Kelamin -->
            <label>Jenis Kelamin:</label><br>
            <input type="radio" name="jk" value="Laki-laki"> Laki-laki<br>
            <input type="radio" name="jk" value="Perempuan"> Perempuan<br><br>

            <!-- Hobi -->
            <label>Hobi:</label><br>
            <input type="checkbox" name="hobi" value="Membaca"> Membaca<br>
            <input type="checkbox" name="hobi" value="Olahraga"> Olahraga<br>
            <input type="checkbox" name="hobi" value="Musik"> Musik<br><br>

            <!-- Upload Foto -->
            <label>Upload Foto:</label><br>
            <input type="file" name="foto"><br><br>

            <!-- Alamat -->
            <label>Alamat:</label><br>
            <textarea name="alamat" rows="4" cols="30"></textarea><br><br>

            <!-- Jurusan -->
            <label>Jurusan:</label><br>
            <select name="jurusan">
                <option value="TI">Teknik Informatika</option>
                <option value="SI">Sistem Informasi</option>
                <option value="RPL">Rekayasa Perangkat Lunak</option>
            </select><br><br>

            <!-- Tombol Submit -->
            <input type="submit" value="Kirim">

        </form>

    </html>
</body>
